<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
    <script src="../script.js" defer></script>
</head>

<body class="Tema-Azul">

    <!-- CABEÇALHO -->

    <header>

        <h1>

            CONFIGURAÇÕES

        </h1>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->

    <main class="Configuracoes">

        <!-- DIFICULDADE -->

        <section class="Painel-Config">

            <h2>

                DIFICULDADE

            </h2>

            <select class="Dificuldade" id="dificuldade">

                <option value="facil">

                    Fácil

                </option>

                <option value="medio">

                    Médio

                </option>

                <option value="dificil">

                    Difícil

                </option>

            </select>

        </section>

        <!-- TEMA -->

        <section class="Painel-Config">

            <h2>

                TEMA

            </h2>

            <select class="Tema" id="tema">

                <option value="Tema-Azul">

                    Azul Neon

                </option>

                <option value="Tema-Roxo">

                    Roxo Neon

                </option>

                <option value="Tema-Vermelho">

                    Vermelho Neon

                </option>

                <option value="Tema-Laranja">

                    Laranja Neon

                </option>

            </select>

        </section>


        <!-- VOLUME -->
        <section class="Painel-Config">
            <h2>

                VOLUME

            </h2>
            <input type="range" class="Volume" id="volume" min="0" max="100" value="50">

        </section>

        <!-- BOTÃO SALVAR -->

        <section class="Painel-Config">

            <button class="Config2-Button" id="Salvar-Config">

                SALVAR CONFIGURAÇÕES

            </button>

        </section>



        <!-- BOTÃO VOLTAR -->

        <section class="Painel-Config">

            <button class="Back-Button" onclick="window.location.href='Inicio.html'">

                VOLTAR AO MENU

            </button>

        </section>

    </main>

    <!-- RODAPÉ -->

    <footer>

        <p>

        </p>

    </footer>

</body>
